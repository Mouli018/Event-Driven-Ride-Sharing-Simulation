name: End-to-End DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  devsecops-pipeline:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          fetch-depth: 0

      - name: Setup Minikube
        uses: manusa/actions-setup-minikube@aa7a69c8cdc3e095a90e146e8f96cdaf950e2e7e # v2.7.2
        with:
          minikube version: 'v1.31.2'
          kubernetes version: 'v1.27.3'
          github token: ${{ secrets.GITHUB_TOKEN }}
          driver: docker

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: "1.5.7"
          terraform_wrapper: false

      - name: Terraform Init & Apply (Infrastructure)
        run: |
          cd terraform
          terraform init -upgrade
          terraform apply -auto-approve -var="github_token=${{ secrets.GITHUB_TOKEN }}"

      - name: Set up Python
        uses: actions/setup-python@65d7f2d534ac1bc67fcd62888c5f4f3d2cb2b236 # v4.7.1
        with:
          python-version: '3.11'

      - name: Install & Test - Microservices
        run: |
          # Ride Request Service
          cd ride-request-service
          pip install -r requirements.txt
          pytest test_main.py -v
          cd ..
          # Matching Service
          cd matching-service
          pip install -r requirements.txt
          pytest test_main.py -v
          cd ..

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@ba3875ecf642b2129de2b589510c81a8b53dbf4e # master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        continue-on-error: true

      - name: Login to GitHub Container Registry
        uses: docker/login-action@465a07811f14bebb1938fbed4728c6a1ff8901fc # v2.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Docker Images
        run: |
          REPO_OWNER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')
          # Build
          docker build -t ghcr.io/$REPO_OWNER/ride-request-service:${{ github.sha }} ./ride-request-service
          docker build -t ghcr.io/$REPO_OWNER/matching-service:${{ github.sha }} ./matching-service
          # Scan with Trivy (Optional but recommended)
          # Push
          docker push ghcr.io/$REPO_OWNER/ride-request-service:${{ github.sha }}
          docker push ghcr.io/$REPO_OWNER/matching-service:${{ github.sha }}

      - name: Update Deployment Manifests
        run: |
          REPO_OWNER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')
          sed -i "s|image: .*ride-request-service:.*|image: ghcr.io/$REPO_OWNER/ride-request-service:${{ github.sha }}|g" k8s-manifests/ride-request-deployment.yaml
          sed -i "s|image: .*matching-service:.*|image: ghcr.io/$REPO_OWNER/matching-service:${{ github.sha }}|g" k8s-manifests/matching-deployment.yaml
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s-manifests/*.yaml
          git commit -m "Update image tags to ${{ github.sha }} [skip ci]" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Argo CD Sync & Health Check
        run: |
          # Apply the ArgoCD Application manifest (ArgoCD will auto-sync)
          kubectl apply -f k8s-manifests/argocd-app.yaml
          
          echo "Waiting for ArgoCD Application to become Healthy..."
          # Wait for the Application status to reach 'Healthy' (up to 10 minutes)
          for i in {1..20}; do
            STATUS=$(kubectl get application ride-share-app -n argocd -o jsonpath='{.status.health.status}' 2>/dev/null || echo "Unknown")
            echo "Current Status: $STATUS"
            if [ "$STATUS" == "Healthy" ]; then
              echo "Deployment Successful and Healthy!"
              exit 0
            fi
            sleep 30
          done
          echo "Timeout waiting for healthy status"
          exit 1
