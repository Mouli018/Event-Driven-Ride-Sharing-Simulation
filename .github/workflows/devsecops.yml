name: End-to-End DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  devsecops-pipeline:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Minikube
        uses: manusa/actions-setup-minikube@v2.7.2
        with:
          minikube version: 'v1.31.2'
          kubernetes version: 'v1.27.3'
          github token: ${{ secrets.GITHUB_TOKEN }}
          driver: docker

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"
          terraform_wrapper: false

      - name: Terraform Init & Apply (Infrastructure)
        run: |
          cd terraform
          terraform init -upgrade
          terraform apply -auto-approve

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install & Test - Microservices
        run: |
          # Ride Request Service
          cd ride-request-service
          pip install -r requirements.txt
          pytest test_main.py -v
          cd ..
          # Matching Service
          cd matching-service
          pip install -r requirements.txt
          pytest test_main.py -v
          cd ..

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        continue-on-error: true

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Docker Images
        run: |
          REPO_OWNER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')
          # Build
          docker build -t ghcr.io/$REPO_OWNER/ride-request-service:${{ github.sha }} ./ride-request-service
          docker build -t ghcr.io/$REPO_OWNER/matching-service:${{ github.sha }} ./matching-service
          # Scan with Trivy (Optional but recommended)
          # Push
          docker push ghcr.io/$REPO_OWNER/ride-request-service:${{ github.sha }}
          docker push ghcr.io/$REPO_OWNER/matching-service:${{ github.sha }}

      - name: Update Deployment Manifests
        run: |
          REPO_OWNER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')
          sed -i "s|image: .*ride-request-service:.*|image: ghcr.io/$REPO_OWNER/ride-request-service:${{ github.sha }}|g" k8s-manifests/ride-request-deployment.yaml
          sed -i "s|image: .*matching-service:.*|image: ghcr.io/$REPO_OWNER/matching-service:${{ github.sha }}|g" k8s-manifests/matching-deployment.yaml
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s-manifests/*.yaml
          git commit -m "Update image tags to ${{ github.sha }} [skip ci]" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Argo CD Sync & Health Check
        run: |
          # Apply the ArgoCD Application manifest if not already present
          kubectl apply -f k8s-manifests/argocd-app.yaml
          
          # Install ArgoCD CLI
          curl -sSL -o argocd-linux-amd64 https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          sudo install -m 555 argocd-linux-amd64 /usr/local/bin/argocd
          rm argocd-linux-amd64
          
          # Wait for ArgoCD namespace and Pods to be ready
          echo "Waiting for ArgoCD server pod to be Ready..."
          kubectl wait --for=condition=Ready pod -l app.kubernetes.io/name=argocd-server -n argocd --timeout=300s
          
          # Wait for ArgoCD initial secret
          echo "Waiting for ArgoCD initial secret..."
          until kubectl -n argocd get secret argocd-initial-admin-secret; do sleep 5; done
          
          # Get ArgoCD Password
          ARGOCD_PWD=$(kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath="{.data.password}" | base64 -d)
          
          # Port-forward in background
          kubectl port-forward svc/argocd-server -n argocd 8080:443 &
          
          # PERSISTENT RETRY LOOP for Login and Sync
          echo "Starting Login and Sync retry loop..."
          for i in {1..20}; do
            echo "Attempt $i: Trying to login and sync..."
            if argocd login localhost:8080 --username admin --password $ARGOCD_PWD --insecure; then
              if argocd app sync ride-share-app --force; then
                echo "Sync successful!"
                break
              fi
            fi
            echo "Login/Sync failed, retrying in 10s..."
            sleep 10
          done
          
          # Final Health Check
          argocd app wait ride-share-app --health --timeout 600
