apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ride-share-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/your-username/ride-sharing' # Update URL 
    targetRevision: HEAD
    path: k8s-manifests
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: ride-share-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
