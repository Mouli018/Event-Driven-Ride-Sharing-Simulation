global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'ride-request-service'
    static_configs:
      - targets: ['ride-request-service:8000']
    metrics_path: /metrics

  - job_name: 'matching-service'
    static_configs:
      - targets: ['matching-service:8001']
    metrics_path: /metrics

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
